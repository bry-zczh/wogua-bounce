      class Spring {
        constructor(config) {
          this.x = config.x;
          this.y = config.y;
          this.baseX = config.x;
          this.baseY = config.y;
          this.width = config.width;
          this.height = config.height;
          this.bounceMultiplier = config.bounceMultiplier || 1.5;
          this.move = config.move || null;
          this.moveTime = this.move?.phase || 0;
          this.velocityX = 0;
          this.velocityY = 0;
        }

        update(dt) {
          if (!this.move) return;
          const oldX = this.x;
          const oldY = this.y;
          const axis = this.move.axis || "x";
          const span = this.move.span || 80;
          const speed = this.move.speed || 1;
          this.moveTime += dt * speed;
          const offset = Math.sin(this.moveTime) * span;

          if (axis === "y") {
            this.x = this.baseX;
            this.y = this.baseY + offset;
          } else {
            this.x = this.baseX + offset;
            this.y = this.baseY;
          }

          if (dt > 0) {
            this.velocityX = (this.x - oldX) / dt;
            this.velocityY = (this.y - oldY) / dt;
          }
        }

        drawTrack(ctx) {
          if (!this.move) return;
          const axis = this.move.axis || "x";
          const span = this.move.span || 80;
          ctx.save();
          ctx.strokeStyle = "rgba(23, 32, 21, 0.36)";
          ctx.lineWidth = 4;
          ctx.setLineDash([8, 8]);
          ctx.beginPath();

          if (axis === "y") {
            const x = this.baseX + this.width / 2;
            ctx.moveTo(x, this.baseY - span + this.height / 2);
            ctx.lineTo(x, this.baseY + span + this.height / 2);
          } else {
            const y = this.baseY + this.height / 2;
            ctx.moveTo(this.baseX - span + this.width / 2, y);
            ctx.lineTo(this.baseX + span + this.width / 2, y);
          }

          ctx.stroke();
          ctx.restore();
        }

        draw(ctx) {
          ctx.save();
          this.drawTrack(ctx);
          const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
          grad.addColorStop(0, "#7fd0f5");
          grad.addColorStop(1, "#3f9ed8");
          ctx.fillStyle = grad;
          ctx.strokeStyle = "#2d6a92";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.roundRect(this.x, this.y, this.width, this.height, 6);
          ctx.fill();
          ctx.stroke();

          ctx.strokeStyle = "rgba(255, 255, 255, 0.85)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          if (this.width > this.height) {
            const centerY = this.y + this.height / 2;
            for (let x = this.x + 12; x < this.x + this.width - 8; x += 18) {
              ctx.moveTo(x, centerY - 8);
              ctx.lineTo(x + 8, centerY + 8);
              ctx.lineTo(x + 16, centerY - 8);
            }
          } else {
            const centerX = this.x + this.width / 2;
            for (let y = this.y + 12; y < this.y + this.height - 8; y += 18) {
              ctx.moveTo(centerX - 8, y);
              ctx.lineTo(centerX + 8, y + 8);
              ctx.lineTo(centerX - 8, y + 16);
            }
          }
          ctx.stroke();

          ctx.fillStyle = "rgba(255, 255, 255, 0.32)";
          ctx.fillRect(this.x + 4, this.y + 3, this.width - 8, 3);
          ctx.restore();
        }
      }

      class Portal {
        constructor(config) {
          this.x = config.x;
          this.y = config.y;
          this.targetX = config.targetX;
          this.targetY = config.targetY;
          this.radius = config.radius || 27;
          this.color = config.color || "#8a65ff";
        }

        contains(projectile) {
          return length(projectile.x - this.x, projectile.y - this.y) < this.radius + projectile.radius * 0.42;
        }

        tryTeleport(projectile, game) {
          if ((projectile.portalCooldown || 0) > 0 || !this.contains(projectile)) return false;

          const speed = length(projectile.velocityX, projectile.velocityY);
          const nx = speed > 0 ? projectile.velocityX / speed : 0;
          const ny = speed > 0 ? projectile.velocityY / speed : -1;
          projectile.x = clamp(this.targetX + nx * 16, projectile.radius, WORLD_WIDTH - projectile.radius);
          projectile.y = clamp(this.targetY + ny * 16, projectile.radius, WORLD_HEIGHT - 14 - projectile.radius);
          projectile.portalCooldown = 0.45;

          if (speed < 280) {
            projectile.velocityX = nx * 320;
            projectile.velocityY = ny * 320;
          }

          game.spawnBurst(this.x, this.y, this.color, 10);
          game.spawnBurst(this.targetX, this.targetY, this.color, 14);
          game.addFloatingText("传送!", this.targetX, this.targetY - 36, this.color);
          return true;
        }

        draw(ctx) {
          const t = (performance.now() || 0) * 0.003;
          ctx.save();
          ctx.translate(this.x, this.y);

          const glow = ctx.createRadialGradient(0, 0, this.radius * 0.3, 0, 0, this.radius + 8);
          glow.addColorStop(0, this.color);
          glow.addColorStop(1, "rgba(138, 101, 255, 0)");
          ctx.globalAlpha = 0.4;
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(0, 0, this.radius + 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;

          ctx.lineWidth = 4;
          ctx.strokeStyle = "#2d5a3d";
          ctx.fillStyle = "rgba(255, 253, 247, 0.82)";
          ctx.beginPath();
          ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.strokeStyle = this.color;
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(0, 0, this.radius - 7, 0.2 + t, Math.PI * 1.72 + t);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, 0, this.radius - 14, 1.2 - t, Math.PI * 0.9 - t);
          ctx.stroke();

          drawPixelDiamond(ctx, 0, 0, 8, this.color);
          ctx.restore();
        }
      }

      class WindZone {
        constructor(config) {
          this.x = config.x;
          this.y = config.y;
          this.width = config.width;
          this.height = config.height;
          this.forceX = config.forceX || 0;
          this.forceY = config.forceY || 0;
          this.label = config.label || "风道";
        }

        contains(projectile) {
          return projectile.x + projectile.radius > this.x
            && projectile.x - projectile.radius < this.x + this.width
            && projectile.y + projectile.radius > this.y
            && projectile.y - projectile.radius < this.y + this.height;
        }

        apply(projectile, dt) {
          if (!this.contains(projectile)) return false;
          projectile.velocityX += this.forceX * dt;
          projectile.velocityY += this.forceY * dt;
          return true;
        }

        draw(ctx) {
          const magnitude = length(this.forceX, this.forceY) || 1;
          const nx = this.forceX / magnitude;
          const ny = this.forceY / magnitude;

          ctx.save();
          const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.width, this.y + this.height);
          grad.addColorStop(0, "rgba(127, 216, 239, 0.16)");
          grad.addColorStop(1, "rgba(127, 216, 239, 0.36)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.roundRect(this.x, this.y, this.width, this.height, 10);
          ctx.fill();
          ctx.strokeStyle = "rgba(45, 90, 61, 0.28)";
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 6]);
          ctx.stroke();
          ctx.setLineDash([]);

          ctx.fillStyle = "#2d5a3d";
          ctx.font = "900 13px ui-rounded, system-ui, sans-serif";
          ctx.textAlign = "left";
          ctx.fillText(this.label, this.x + 9, this.y + 19);

          ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
          ctx.lineWidth = 4;
          ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
          for (let y = this.y + 38; y < this.y + this.height - 14; y += 34) {
            for (let x = this.x + 28; x < this.x + this.width - 18; x += 58) {
              const ex = x + nx * 24;
              const ey = y + ny * 24;
              ctx.beginPath();
              ctx.moveTo(x, y);
              ctx.lineTo(ex, ey);
              ctx.stroke();
              ctx.beginPath();
              ctx.moveTo(ex, ey);
              ctx.lineTo(ex - nx * 8 - ny * 5, ey - ny * 8 + nx * 5);
              ctx.lineTo(ex - nx * 8 + ny * 5, ey - ny * 8 - nx * 5);
              ctx.closePath();
              ctx.fill();
            }
          }

          ctx.restore();
        }
      }

      class Particle {
        constructor(x, y, vx, vy, color, size, life, gravity = 0) {
          this.x = x;
          this.y = y;
          this.vx = vx;
          this.vy = vy;
          this.color = color;
          this.size = size;
          this.life = life;
          this.maxLife = life;
          this.gravity = gravity;
        }

        update(dt) {
          this.life -= dt;
          this.x += this.vx * dt;
          this.y += this.vy * dt;
          this.vy += this.gravity * dt;
        }

        draw(ctx) {
          if (this.life <= 0) return;
          ctx.globalAlpha = clamp(this.life / this.maxLife, 0, 1);
          drawPixelDiamond(ctx, this.x, this.y, this.size, this.color);
          ctx.globalAlpha = 1;
        }
      }

      class FloatingText {
        constructor(text, x, y, color) {
          this.text = text;
          this.x = x;
          this.y = y;
          this.color = color;
          this.life = 0.75;
          this.maxLife = 0.75;
        }

        update(dt) {
          this.life -= dt;
          this.y -= 44 * dt;
        }

        draw(ctx) {
          if (this.life <= 0) return;
          ctx.save();
          ctx.globalAlpha = clamp(this.life / this.maxLife, 0, 1);
          ctx.font = "900 17px ui-rounded, system-ui, sans-serif";
          ctx.textAlign = "center";
          ctx.lineWidth = 4;
          ctx.strokeStyle = "rgba(45, 90, 61, 0.9)";
          ctx.fillStyle = this.color;
          ctx.strokeText(this.text, this.x, this.y);
          ctx.fillText(this.text, this.x, this.y);
          ctx.restore();
        }
      }

      class Game {
        constructor() {
          this.canvas = document.getElementById("game");
          this.ctx = this.canvas.getContext("2d");
          this.ctx.imageSmoothingEnabled = false;

          this.hud = document.querySelector(".hud");
          this.mainMenu = document.getElementById("mainMenu");
          this.levelSelect = document.getElementById("levelSelect");
          this.codexScreen = document.getElementById("codexScreen");
          this.startBtn = document.getElementById("startBtn");
          this.levelSelectBtn = document.getElementById("levelSelectBtn");
          this.skillsBtn = document.getElementById("skillsBtn");
          this.codexBtn = document.getElementById("codexBtn");
          this.levelGrid = document.getElementById("levelGrid");
          this.prevLevelPageBtn = document.getElementById("prevLevelPageBtn");
          this.nextLevelPageBtn = document.getElementById("nextLevelPageBtn");
          this.levelPageText = document.getElementById("levelPageText");
          this.codexTabs = document.getElementById("codexTabs");
          this.codexContent = document.getElementById("codexContent");
          this.skillScreen = document.getElementById("skillScreen");
          this.skillSummary = document.getElementById("skillSummary");
          this.skillList = document.getElementById("skillList");
          this.resetSkillsBtn = document.getElementById("resetSkillsBtn");
          this.backToMenuBtns = document.querySelectorAll(".backToMenuBtn");
          this.levelStat = document.getElementById("levelStat");
          this.shotsStat = document.getElementById("shotsStat");
          this.monsterStat = document.getElementById("monsterStat");
          this.menuBtn = document.getElementById("menuBtn");
          this.hintBtn = document.getElementById("hintBtn");
          this.hintBox = document.getElementById("hintBox");
          this.restartBtn = document.getElementById("restartBtn");
          this.nextBtn = document.getElementById("nextBtn");
          this.powerMeter = document.getElementById("powerMeter");
          this.powerFill = document.getElementById("powerFill");
          this.powerText = document.getElementById("powerText");
          this.overlay = document.getElementById("overlay");
          this.overlayTitle = document.getElementById("overlayTitle");
          this.overlayText = document.getElementById("overlayText");
          this.retryBtn = document.getElementById("retryBtn");
          this.overlayMenuBtn = document.getElementById("overlayMenuBtn");
          this.overlayNextBtn = document.getElementById("overlayNextBtn");

          this.levelIndex = 0;
          this.levelPageIndex = 0;
          this.state = "menu";
          this.shotsLeft = 0;
          this.aiming = false;
          this.pointerId = null;
          this.dragPoint = { x: 0, y: 0 };
          this.particles = [];
          this.floatTexts = [];
          this.shake = 0;
          this.lastTime = performance.now();
          this.squashSprite = null;
          this.activeCodexIndex = 0;
          this.skills = this.loadSkills();
          this.miniSquashes = [];
          this.hintVisible = false;

          this.loadSquashSprite();
          this.bindEvents();
          this.renderLevelSelect();
          this.renderCodex();
          this.renderSkillScreen();
          this.loadLevel(0, { play: false });
          this.showMainMenu();
          requestAnimationFrame((time) => this.loop(time));
        }

        loadSquashSprite() {
          const image = new Image();
          image.onload = () => {
            this.squashSprite = image;
            if (this.squash) this.squash.setSprite(this.squashSprite);
          };
          image.src = "assets/wogua.png?v=transparent-bg";
        }

        bindEvents() {
          this.canvas.addEventListener("pointerdown", (event) => this.onPointerDown(event));
          this.canvas.addEventListener("pointermove", (event) => this.onPointerMove(event));
          this.canvas.addEventListener("pointerup", (event) => this.onPointerUp(event));
          this.canvas.addEventListener("pointercancel", (event) => this.onPointerUp(event));
          this.canvas.addEventListener("contextmenu", (event) => event.preventDefault());

          this.startBtn.addEventListener("click", () => this.startLevel(0));
          this.levelSelectBtn.addEventListener("click", () => this.showLevelSelect());
          this.skillsBtn.addEventListener("click", () => this.showSkills());
          this.codexBtn.addEventListener("click", () => this.showCodex());
          this.prevLevelPageBtn.addEventListener("click", () => this.changeLevelPage(-1));
          this.nextLevelPageBtn.addEventListener("click", () => this.changeLevelPage(1));
          for (const button of this.backToMenuBtns) {
            button.addEventListener("click", () => this.showMainMenu());
          }
          this.menuBtn.addEventListener("click", () => this.showMainMenu());
          this.hintBtn.addEventListener("click", () => this.toggleHint());
          this.restartBtn.addEventListener("click", () => this.loadLevel(this.levelIndex));
          this.retryBtn.addEventListener("click", () => this.loadLevel(this.levelIndex));
          this.overlayMenuBtn.addEventListener("click", () => this.showMainMenu());
          this.nextBtn.addEventListener("click", () => this.nextLevel());
          this.overlayNextBtn.addEventListener("click", () => this.nextLevel());
          this.resetSkillsBtn.addEventListener("click", () => {
            this.skills = { ...DEFAULT_SKILLS };
            this.saveSkills();
            this.renderSkillScreen();
          });
        }

        loadSkills() {
          try {
            const raw = localStorage.getItem("woguaSkills");
            if (!raw) return { ...DEFAULT_SKILLS };
            const parsed = JSON.parse(raw);
            const skills = { ...DEFAULT_SKILLS };
            for (const skill of SKILLS) {
              skills[skill.id] = clamp(Number(parsed[skill.id]) || 0, 0, skill.max);
            }
            return this.normalizeSkills(skills);
          } catch {
            return { ...DEFAULT_SKILLS };
          }
        }

        normalizeSkills(skills) {
          const normalized = { ...DEFAULT_SKILLS };
          for (const skill of SKILLS) {
            normalized[skill.id] = clamp(Number(skills[skill.id]) || 0, 0, skill.max);
          }

          while (this.getSkillPointsUsed(normalized) > TOTAL_SKILL_POINTS) {
            for (let i = SKILLS.length - 1; i >= 0 && this.getSkillPointsUsed(normalized) > TOTAL_SKILL_POINTS; i -= 1) {
              const id = SKILLS[i].id;
              normalized[id] = Math.max(0, normalized[id] - 1);
            }
          }

          return normalized;
        }

        saveSkills() {
          try {
            localStorage.setItem("woguaSkills", JSON.stringify(this.skills));
          } catch {
            // Local storage can be unavailable in private browser contexts.
          }
        }

        getSkillPointsUsed(skills = this.skills) {
          return SKILLS.reduce((sum, skill) => sum + (Number(skills[skill.id]) || 0), 0);
        }

        skillLevel(id) {
          return Number(this.skills[id]) || 0;
        }

        renderSkillScreen() {
          this.skillList.textContent = "";
          const used = this.getSkillPointsUsed();
          this.skillSummary.textContent = `技能点 ${used}/${TOTAL_SKILL_POINTS}，加点会影响所有关卡。`;

          for (const skill of SKILLS) {
            const level = this.skillLevel(skill.id);
            const card = document.createElement("article");
            card.className = "skill-card";

            const body = document.createElement("div");
            const name = document.createElement("strong");
            name.textContent = skill.name;
            const text = document.createElement("span");
            text.textContent = skill.text;
            body.append(name, text);

            const stepper = document.createElement("div");
            stepper.className = "skill-stepper";

            const minus = document.createElement("button");
            minus.type = "button";
            minus.textContent = "-";
            minus.disabled = level <= 0;
            minus.addEventListener("click", () => this.adjustSkill(skill.id, -1));

            const value = document.createElement("div");
            value.className = "skill-level";
            value.textContent = `${level}/${skill.max}`;

            const plus = document.createElement("button");
            plus.type = "button";
            plus.textContent = "+";
            plus.disabled = level >= skill.max || used >= TOTAL_SKILL_POINTS;
            plus.addEventListener("click", () => this.adjustSkill(skill.id, 1));

            stepper.append(minus, value, plus);
            card.append(body, stepper);
            this.skillList.append(card);
          }
        }

        adjustSkill(id, delta) {
          const skill = SKILLS.find((item) => item.id === id);
          if (!skill) return;
          const next = clamp(this.skillLevel(id) + delta, 0, skill.max);
          if (delta > 0 && this.getSkillPointsUsed() >= TOTAL_SKILL_POINTS) return;
          this.skills[id] = next;
          this.saveSkills();
          this.renderSkillScreen();
        }

        getLevelPageCount() {
          return Math.max(1, Math.ceil(LEVELS.length / LEVELS_PER_PAGE));
        }

        changeLevelPage(delta) {
          const pageCount = this.getLevelPageCount();
          const nextPage = clamp(this.levelPageIndex + delta, 0, pageCount - 1);
          if (nextPage === this.levelPageIndex) return;
          this.levelPageIndex = nextPage;
          this.renderLevelSelect();
          this.updateLevelCards();
        }

        renderLevelSelect() {
          this.levelGrid.textContent = "";
          const pageCount = this.getLevelPageCount();
          this.levelPageIndex = clamp(this.levelPageIndex, 0, pageCount - 1);
          const startIndex = this.levelPageIndex * LEVELS_PER_PAGE;
          const endIndex = Math.min(startIndex + LEVELS_PER_PAGE, LEVELS.length);

          for (let index = startIndex; index < endIndex; index += 1) {
            const level = LEVELS[index];
            const card = document.createElement("button");
            card.type = "button";
            card.className = "level-card";
            card.dataset.level = String(index);

            const title = document.createElement("strong");
            title.textContent = level.title;

            const mechanics = document.createElement("span");
            mechanics.textContent = level.mechanics.join(" / ");

            const note = document.createElement("small");
            note.textContent = level.note;

            card.append(title, mechanics, note);
            card.addEventListener("click", () => this.startLevel(index));
            this.levelGrid.append(card);
          }

          this.updateLevelPager();
        }

        renderCodex() {
          this.codexTabs.textContent = "";

          CODEX_SECTIONS.forEach((section, index) => {
            const tab = document.createElement("button");
            tab.type = "button";
            tab.textContent = section.title;
            tab.className = index === this.activeCodexIndex ? "is-active" : "";
            tab.addEventListener("click", () => {
              this.activeCodexIndex = index;
              this.renderCodex();
            });
            this.codexTabs.append(tab);
          });

          this.codexContent.textContent = "";
          const section = CODEX_SECTIONS[this.activeCodexIndex];

          const sectionEl = document.createElement("section");
          sectionEl.className = "codex-section";

          const heading = document.createElement("h3");
          heading.textContent = section.title;

          const list = document.createElement("div");
          list.className = "codex-list";

          for (const item of section.items) {
            const card = document.createElement("article");
            card.className = "codex-card";

            const icon = document.createElement("div");
            icon.className = `codex-icon ${section.iconClass}`.trim();
            icon.textContent = item.icon;

            const body = document.createElement("div");
            const name = document.createElement("strong");
            name.textContent = item.name;
            const text = document.createElement("span");
            text.textContent = item.text;
            body.append(name, text);

            card.append(icon, body);
            list.append(card);
          }

          sectionEl.append(heading, list);
          this.codexContent.append(sectionEl);
        }

        startLevel(index) {
          this.loadLevel(index, { play: true });
        }

        showScreen(screen) {
          this.mainMenu.classList.toggle("hidden", screen !== "menu");
          this.levelSelect.classList.toggle("hidden", screen !== "levels");
          this.codexScreen.classList.toggle("hidden", screen !== "codex");
          this.skillScreen.classList.toggle("hidden", screen !== "skills");
        }

        showMainMenu() {
          this.state = "menu";
          this.aiming = false;
          this.pointerId = null;
          this.hintVisible = false;
          this.miniSquashes = [];
          if (this.squash) {
            this.squash.velocityX = 0;
            this.squash.velocityY = 0;
            if (this.squash.state !== "idle") this.squash.reset();
          }
          this.overlay.classList.add("hidden");
          this.nextBtn.classList.add("hidden");
          this.powerMeter.classList.add("hidden");
          this.hintBox.classList.add("hidden");
          this.hud.classList.add("hidden");
          this.showScreen("menu");
          this.updateLevelCards();
        }

        showLevelSelect() {
          this.state = "menu";
          this.hintVisible = false;
          this.miniSquashes = [];
          this.overlay.classList.add("hidden");
          this.hintBox.classList.add("hidden");
          this.hud.classList.add("hidden");
          this.levelPageIndex = Math.floor(this.levelIndex / LEVELS_PER_PAGE);
          this.renderLevelSelect();
          this.showScreen("levels");
          this.updateLevelCards();
        }

        showCodex() {
          this.state = "menu";
          this.hintVisible = false;
          this.miniSquashes = [];
          this.overlay.classList.add("hidden");
          this.hintBox.classList.add("hidden");
          this.hud.classList.add("hidden");
          this.showScreen("codex");
        }

        showSkills() {
          this.state = "menu";
          this.hintVisible = false;
          this.miniSquashes = [];
          this.overlay.classList.add("hidden");
          this.hintBox.classList.add("hidden");
          this.hud.classList.add("hidden");
          this.renderSkillScreen();
          this.showScreen("skills");
        }

        updateLevelCards() {
          const cards = this.levelGrid.querySelectorAll(".level-card");
          cards.forEach((card) => {
            card.classList.toggle("is-current", Number(card.dataset.level) === this.levelIndex);
          });
          this.updateLevelPager();
        }

        updateLevelPager() {
          const pageCount = this.getLevelPageCount();
          this.levelPageText.textContent = `${this.levelPageIndex + 1} / ${pageCount}`;
          this.prevLevelPageBtn.disabled = this.levelPageIndex <= 0;
          this.nextLevelPageBtn.disabled = this.levelPageIndex >= pageCount - 1;
        }

        loadLevel(index, options = {}) {
          const safeIndex = (index + LEVELS.length) % LEVELS.length;
          const level = LEVELS[safeIndex];
          const play = options.play !== false;

          this.levelIndex = safeIndex;
          this.state = play ? "playing" : "menu";
          this.hintVisible = false;
          this.shotsLeft = level.shots + this.skillLevel("bounce");
          this.aiming = false;
          this.pointerId = null;
          this.miniSquashes = [];
          this.particles = [];
          this.floatTexts = [];
          this.shake = 0;
          this.squash = new Squash(level.start);
          if (this.squashSprite) this.squash.setSprite(this.squashSprite);
          this.monsters = level.monsters.map((config) => new Monster(config));
          this.crates = level.crates.map((config) => new Crate(config));
          this.bombs = level.bombs.map((config) => new Bomb(config));
          this.springs = level.springs.map((config) => new Spring(config));
          this.portals = (level.portals || []).map((config) => new Portal(config));
          this.windZones = (level.windZones || []).map((config) => new WindZone(config));
          this.applySkillTerrain();

          this.overlay.classList.add("hidden");
          this.overlayNextBtn.classList.remove("hidden");
          this.nextBtn.textContent = "下一关";
          this.nextBtn.classList.add("hidden");
          this.showScreen(null);
          this.hud.classList.toggle("hidden", !play);
          this.hintBox.classList.add("hidden");
          this.updateLevelCards();
          this.syncUI();
        }

        applySkillTerrain() {
          const level = this.skillLevel("terrain");
          if (level <= 0) return;

          this.crates = this.crates.slice(level);
          const springWidth = level === 1 ? 132 : 176;
          const springX = 42;
          this.springs.push(new Spring({
            x: springX,
            y: 640,
            width: springWidth,
            height: 22,
            bounceMultiplier: 1.16 + level * 0.12
          }));
          this.addFloatingText("地形改造", springX + springWidth / 2, 628, "#4ca3dd");
        }

        nextLevel() {
          this.loadLevel(this.levelIndex + 1);
        }

        getPointer(event) {
          const rect = this.canvas.getBoundingClientRect();
          return {
            x: ((event.clientX - rect.left) / rect.width) * WORLD_WIDTH,
            y: ((event.clientY - rect.top) / rect.height) * WORLD_HEIGHT
          };
        }

        onPointerDown(event) {
          event.preventDefault();
          if (this.state !== "playing") return;
          if (this.squash.state !== "idle") return;
          if (this.shotsLeft <= 0) return;

          const point = this.getPointer(event);
          if (!this.squash.contains(point)) return;

          this.aiming = true;
          this.pointerId = event.pointerId;
          this.dragPoint = point;
          this.squash.state = "aiming";
          this.canvas.setPointerCapture(event.pointerId);
        }

        onPointerMove(event) {
          if (!this.aiming || event.pointerId !== this.pointerId) return;
          event.preventDefault();
          this.dragPoint = this.getPointer(event);
          this.syncUI();
        }

        onPointerUp(event) {
          if (!this.aiming || event.pointerId !== this.pointerId) return;
          event.preventDefault();

          const launch = this.getLaunchVector();
          this.aiming = false;
          this.pointerId = null;
          this.canvas.releasePointerCapture(event.pointerId);

          if (launch.power > 10 && this.shotsLeft > 0) {
            this.squash.launch(launch.vx, launch.vy);
            this.spawnSplitSquashes(launch);
            this.shotsLeft -= 1;
            this.shake = Math.max(this.shake, 4);
            this.spawnBurst(this.squash.x, this.squash.y, "#f2c94c", 8);
          } else {
            this.squash.state = "idle";
          }

          this.syncUI();
        }

        getLaunchVector() {
          const dx = this.squash.x - this.dragPoint.x;
          const dy = this.squash.y - this.dragPoint.y;
          const distance = length(dx, dy);
          if (distance < 0.001) {
            return { vx: 0, vy: 0, power: 0, percent: 0, nx: 0, ny: -1 };
          }

          const power = clamp(distance, 0, MAX_DRAG);
          const nx = dx / distance;
          const ny = dy / distance;
          return {
            vx: nx * power * POWER_SCALE,
            vy: ny * power * POWER_SCALE,
            power,
            percent: power / MAX_DRAG,
            nx,
            ny
          };
        }

        rotateVector(vx, vy, angle) {
          const cos = Math.cos(angle);
          const sin = Math.sin(angle);
          return {
            vx: vx * cos - vy * sin,
            vy: vx * sin + vy * cos
          };
        }

        spawnSplitSquashes(launch) {
          const level = this.skillLevel("split");
          if (level <= 0 || !this.squashSprite) return;

          const angles = level === 1 ? [-0.16, 0.16] : [-0.22, 0, 0.22];
          for (const angle of angles) {
            const rotated = this.rotateVector(launch.vx * 0.82, launch.vy * 0.82, angle);
            this.miniSquashes.push(new MiniSquash(
              this.squash.x + launch.nx * 18,
              this.squash.y + launch.ny * 18,
              rotated.vx,
              rotated.vy,
              this.squashSprite
            ));
          }

          this.addFloatingText("分裂!", this.squash.x, this.squash.y - 48, "#f2c94c");
        }

        loop(time) {
          const dt = Math.min(0.033, (time - this.lastTime) / 1000 || 0);
          this.lastTime = time;
          this.update(dt, time / 1000);
          this.draw();
          requestAnimationFrame((nextTime) => this.loop(nextTime));
        }

        update(dt) {
          for (const monster of this.monsters) monster.update(dt);

          if (this.state === "playing") {
            for (const spring of this.springs) spring.update(dt);
            this.squash.integrate(dt);
            if (this.squash.state === "moving") {
              this.applyWind(this.squash, dt);
              this.handleBounds(this.squash);
              this.handlePortals(this.squash);
              this.handleCollisions(this.squash);

              if (this.squash.shouldStop(dt)) {
                this.finishShot();
              }
            }

            for (const mini of this.miniSquashes) {
              mini.integrate(dt);
              if (!mini.isAlive) continue;
              this.applyWind(mini, dt);
              this.handleBounds(mini);
              this.handlePortals(mini);
              this.handleCollisions(mini);
            }
            this.miniSquashes = this.miniSquashes.filter((mini) => mini.isAlive);

            if (this.monsters.every((monster) => !monster.isAlive)) {
              this.completeLevel();
            }
          }

          this.particles = this.particles.filter((particle) => {
            particle.update(dt);
            return particle.life > 0;
          });

          this.floatTexts = this.floatTexts.filter((text) => {
            text.update(dt);
            return text.life > 0;
          });

          this.shake = Math.max(0, this.shake - dt * 30);
          this.syncUI();
        }

        applyWind(projectile, dt) {
          if (!this.windZones) return;
          let pushed = false;

          for (const zone of this.windZones) {
            if (zone.apply(projectile, dt)) pushed = true;
          }

          if (!pushed) return;
          this.limitProjectileSpeed(projectile);

          if (Math.random() < 0.08) {
            this.particles.push(new Particle(
              projectile.x - Math.sign(projectile.velocityX || 1) * projectile.radius,
              projectile.y + (Math.random() - 0.5) * projectile.radius,
              -projectile.velocityX * 0.08,
              -projectile.velocityY * 0.08,
              "#dff6ff",
              2,
              0.25
            ));
          }
        }

        handlePortals(projectile) {
          if (!this.portals) return;
          for (const portal of this.portals) {
            if (portal.tryTeleport(projectile, this)) {
              this.limitProjectileSpeed(projectile);
              break;
            }
          }
        }

        limitProjectileSpeed(projectile) {
          const speed = length(projectile.velocityX, projectile.velocityY);
          if (speed <= MAX_SPEED) return;
          projectile.velocityX = (projectile.velocityX / speed) * MAX_SPEED;
          projectile.velocityY = (projectile.velocityY / speed) * MAX_SPEED;
        }

        handleBounds(projectile) {
          const s = projectile;
          const r = s.radius;
          let hit = false;

          if (s.x - r < 0) {
            s.x = r;
            s.velocityX = Math.abs(s.velocityX) * s.bounce;
            hit = true;
          } else if (s.x + r > WORLD_WIDTH) {
            s.x = WORLD_WIDTH - r;
            s.velocityX = -Math.abs(s.velocityX) * s.bounce;
            hit = true;
          }

          if (s.y - r < 0) {
            s.y = r;
            s.velocityY = Math.abs(s.velocityY) * s.bounce;
            hit = true;
          } else if (s.y + r > WORLD_HEIGHT - 14) {
            s.y = WORLD_HEIGHT - 14 - r;
            s.velocityY = -Math.abs(s.velocityY) * s.bounce;
            hit = true;
          }

          if (hit) this.onBounce(s.x, s.y, "#fff8dc", 0.85);
        }

        handleCollisions(projectile) {
          const s = projectile;

          for (const monster of this.monsters) {
            if (!monster.isAlive) continue;
            const dx = s.x - monster.x;
            const dy = s.y - monster.y;
            const dist = length(dx, dy);
            const minDist = s.radius + monster.radius;

            if (dist > 0 && dist < minDist) {
              const nx = dx / dist;
              const ny = dy / dist;
              const depth = minDist - dist;
              s.x += nx * depth;
              s.y += ny * depth;
              this.reflectSquash(nx, ny, 0.92, 1, s);
              s.hitSquash = 1;

              if (monster.hit(s.damage, this)) {
                this.shake = Math.max(this.shake, 8);
              }
            }
          }

          for (const crate of this.crates) {
            if (!crate.alive) continue;
            const collision = rectCircleCollision(s, crate);
            if (!collision.hit) continue;

            s.x += collision.nx * (collision.depth + 1);
            s.y += collision.ny * (collision.depth + 1);
            this.reflectSquash(collision.nx, collision.ny, 0.82, 0.92, s);
            crate.hit(this);
            s.hitSquash = 1;
            this.shake = Math.max(this.shake, 7);
          }

          for (const bomb of this.bombs) {
            if (!bomb.alive) continue;
            const dx = s.x - bomb.x;
            const dy = s.y - bomb.y;
            const dist = length(dx, dy);
            if (dist > 0 && dist < s.radius + bomb.radius) {
              const nx = dx / dist;
              const ny = dy / dist;
              s.x += nx * (s.radius + bomb.radius - dist + 1);
              s.y += ny * (s.radius + bomb.radius - dist + 1);
              this.reflectSquash(nx, ny, 0.9, 1.05, s);
              bomb.explode(this);
              s.hitSquash = 1;
            }
          }

          for (const spring of this.springs) {
            const collision = rectCircleCollision(s, spring);
            if (!collision.hit) continue;

            s.x += collision.nx * (collision.depth + 1);
            s.y += collision.ny * (collision.depth + 1);
            this.reflectSquash(collision.nx, collision.ny, 0.98, spring.bounceMultiplier, s);
            s.velocityX += spring.velocityX * 0.28;
            s.velocityY += spring.velocityY * 0.28;
            this.limitProjectileSpeed(s);
            s.hitSquash = 1;
            this.shake = Math.max(this.shake, 6);
            this.spawnBurst(s.x, s.y, "#4ca3dd", 10);
          }
        }

        reflectSquash(nx, ny, bounce, boost, projectile = this.squash) {
          const s = projectile;
          const dot = s.velocityX * nx + s.velocityY * ny;
          if (dot < 0) {
            s.velocityX = (s.velocityX - 2 * dot * nx) * bounce * boost;
            s.velocityY = (s.velocityY - 2 * dot * ny) * bounce * boost;
          } else {
            s.velocityX += nx * 90;
            s.velocityY += ny * 90;
          }

          const speed = length(s.velocityX, s.velocityY);
          if (speed > MAX_SPEED) {
            s.velocityX = (s.velocityX / speed) * MAX_SPEED;
            s.velocityY = (s.velocityY / speed) * MAX_SPEED;
          }
        }

        onBounce(x, y, color, strength) {
          this.shake = Math.max(this.shake, 3 + 4 * strength);
          this.spawnBurst(x, y, color, 7);
        }

        finishShot() {
          if (this.monsters.every((monster) => !monster.isAlive)) {
            this.completeLevel();
            return;
          }

          if (this.shotsLeft <= 0) {
            this.failLevel();
            return;
          }

          this.squash.reset();
          this.miniSquashes = [];
        }

        completeLevel() {
          if (this.state !== "playing") return;
          this.state = "complete";
          this.squash.velocityX = 0;
          this.squash.velocityY = 0;
          this.miniSquashes = [];
          this.nextBtn.classList.remove("hidden");
          this.overlayNextBtn.classList.remove("hidden");
          this.overlayTitle.textContent = this.levelIndex === LEVELS.length - 1 ? "全部通关" : "关卡完成";
          this.overlayText.textContent = this.levelIndex === LEVELS.length - 1 ? `${LEVELS.length} 个关卡全部清空` : "继续下一关";
          this.nextBtn.textContent = this.levelIndex === LEVELS.length - 1 ? "再玩一轮" : "下一关";
          this.overlayNextBtn.textContent = this.levelIndex === LEVELS.length - 1 ? "再玩一轮" : "下一关";
          this.overlay.classList.remove("hidden");
        }

        failLevel() {
          if (this.state !== "playing") return;
          this.state = "failed";
          this.squash.velocityX = 0;
          this.squash.velocityY = 0;
          this.miniSquashes = [];
          this.overlayTitle.textContent = "挑战失败";
          this.overlayText.textContent = "调整角度再试一次";
          this.overlayNextBtn.textContent = "下一关";
          this.overlayNextBtn.classList.add("hidden");
          this.overlay.classList.remove("hidden");
        }

        toggleHint() {
          if (this.state !== "playing") return;
          const hint = LEVELS[this.levelIndex].hint;
          this.hintVisible = !this.hintVisible;
          this.hintBox.textContent = hint || "这一关可以多利用墙面反弹，瞄准线越长力度越大。";
          this.hintBox.classList.toggle("hidden", !this.hintVisible);
          this.hintBtn.textContent = this.hintVisible ? "收起" : "提示";
        }

        syncUI() {
          if (!this.monsters) return;
          const total = this.monsters.length || 1;
          const alive = this.monsters.filter((monster) => monster.isAlive).length;
          this.levelStat.textContent = `第 ${this.levelIndex + 1} 关`;
          this.shotsStat.textContent = `次数 ${this.shotsLeft}`;
          this.monsterStat.textContent = `怪物 ${alive}/${total}`;
          this.hintBtn.textContent = this.hintVisible ? "收起" : "提示";

          if (this.aiming) {
            const launch = this.getLaunchVector();
            this.powerMeter.classList.remove("hidden");
            this.powerFill.style.width = `${Math.round(launch.percent * 100)}%`;
            this.powerText.textContent = `力度 ${Math.round(launch.percent * 100)}%`;
          } else {
            this.powerMeter.classList.add("hidden");
          }
        }

        spawnBurst(x, y, color, count) {
          for (let i = 0; i < count; i += 1) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 55 + Math.random() * 145;
            this.particles.push(new Particle(
              x,
              y,
              Math.cos(angle) * speed,
              Math.sin(angle) * speed,
              color,
              2 + Math.random() * 4,
              0.35 + Math.random() * 0.38,
              140
            ));
          }
        }

        spawnExplosion(x, y, radius) {
          for (let i = 0; i < 46; i += 1) {
            const angle = (Math.PI * 2 * i) / 46;
            const speed = radius * (0.85 + Math.random() * 0.5);
            this.particles.push(new Particle(
              x,
              y,
              Math.cos(angle) * speed,
              Math.sin(angle) * speed,
              i % 2 === 0 ? "#f2c94c" : "#d85745",
              4 + Math.random() * 5,
              0.55 + Math.random() * 0.28,
              -20
            ));
          }
        }

        addFloatingText(text, x, y, color) {
          this.floatTexts.push(new FloatingText(text, x, y, color));
        }

        draw() {
          const ctx = this.ctx;
          ctx.clearRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

          ctx.save();
          if (this.shake > 0) {
            ctx.translate((Math.random() - 0.5) * this.shake, (Math.random() - 0.5) * this.shake);
          }

          this.drawBackground(ctx);
          for (const windZone of this.windZones || []) windZone.draw(ctx);
          if (this.hintVisible) this.drawRouteHint(ctx);
          if (this.aiming) this.drawAim(ctx);

          for (const spring of this.springs) spring.draw(ctx);
          for (const crate of this.crates) crate.draw(ctx);
          for (const bomb of this.bombs) bomb.draw(ctx);
          for (const portal of this.portals || []) portal.draw(ctx);
          for (const monster of this.monsters) monster.draw(ctx);
          for (const mini of this.miniSquashes) mini.draw(ctx);
          this.squash.draw(ctx);
          for (const particle of this.particles) particle.draw(ctx);
          for (const text of this.floatTexts) text.draw(ctx);

          ctx.restore();
        }

        drawBackground(ctx) {
          const sky = ctx.createLinearGradient(0, 0, 0, WORLD_HEIGHT);
          sky.addColorStop(0, "#cfeffb");
          sky.addColorStop(0.45, "#ffe3ef");
          sky.addColorStop(0.78, "#ffe9c2");
          sky.addColorStop(1, "#bfe89a");
          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

          const sun = ctx.createRadialGradient(392, 96, 8, 392, 96, 190);
          sun.addColorStop(0, "rgba(255, 247, 200, 0.9)");
          sun.addColorStop(1, "rgba(255, 247, 200, 0)");
          ctx.fillStyle = sun;
          ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

          ctx.fillStyle = "rgba(150, 196, 178, 0.55)";
          ctx.beginPath();
          ctx.moveTo(0, 540);
          ctx.quadraticCurveTo(120, 470, 245, 532);
          ctx.quadraticCurveTo(360, 590, 480, 512);
          ctx.lineTo(480, 560);
          ctx.lineTo(0, 560);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#86bd8e";
          ctx.beginPath();
          ctx.moveTo(0, 582);
          ctx.quadraticCurveTo(110, 524, 230, 586);
          ctx.quadraticCurveTo(355, 644, 480, 566);
          ctx.lineTo(480, WORLD_HEIGHT);
          ctx.lineTo(0, WORLD_HEIGHT);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
          this.drawCloud(ctx, 78, 122, 30);
          this.drawCloud(ctx, 344, 84, 23);

          ctx.fillStyle = "#6fb33f";
          ctx.beginPath();
          ctx.moveTo(0, WORLD_HEIGHT - 32);
          for (let x = 0; x <= WORLD_WIDTH; x += 24) {
            ctx.quadraticCurveTo(x + 6, WORLD_HEIGHT - 40, x + 24, WORLD_HEIGHT - 32);
          }
          ctx.lineTo(WORLD_WIDTH, WORLD_HEIGHT);
          ctx.lineTo(0, WORLD_HEIGHT);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#4f9e2e";
          for (let x = -20; x < WORLD_WIDTH; x += 30) {
            ctx.beginPath();
            ctx.moveTo(x, WORLD_HEIGHT - 30);
            ctx.lineTo(x + 5, WORLD_HEIGHT - 47);
            ctx.lineTo(x + 10, WORLD_HEIGHT - 30);
            ctx.closePath();
            ctx.fill();
          }

          const flowers = [[42, "#ff5d8f"], [180, "#ffc23c"], [312, "#ff9e7a"], [430, "#ffffff"]];
          for (const [fx, fc] of flowers) {
            const fy = WORLD_HEIGHT - 30;
            ctx.fillStyle = fc;
            for (let a = 0; a < 5; a += 1) {
              const ang = (a / 5) * Math.PI * 2;
              ctx.beginPath();
              ctx.arc(fx + Math.cos(ang) * 3.2, fy + Math.sin(ang) * 3.2, 2.4, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.fillStyle = "#ffc23c";
            ctx.beginPath();
            ctx.arc(fx, fy, 1.8, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        drawCloud(ctx, x, y, size) {
          ctx.beginPath();
          ctx.arc(x, y, size, 0, Math.PI * 2);
          ctx.arc(x + size * 0.8, y + 6, size * 0.82, 0, Math.PI * 2);
          ctx.arc(x - size * 0.9, y + 9, size * 0.72, 0, Math.PI * 2);
          ctx.arc(x + size * 0.3, y - size * 0.5, size * 0.62, 0, Math.PI * 2);
          ctx.fill();
        }

        drawRouteHint(ctx) {
          const route = LEVELS[this.levelIndex].route;
          if (!route || route.length < 2) return;

          ctx.save();
          ctx.lineWidth = 5;
          ctx.strokeStyle = "rgba(242, 201, 76, 0.95)";
          ctx.setLineDash([12, 10]);
          ctx.beginPath();
          ctx.moveTo(route[0].x, route[0].y);
          for (let i = 1; i < route.length; i += 1) {
            ctx.lineTo(route[i].x, route[i].y);
          }
          ctx.stroke();
          ctx.setLineDash([]);

          for (let i = 1; i < route.length; i += 1) {
            ctx.fillStyle = i === 1 ? "#d85745" : "#f2c94c";
            ctx.strokeStyle = "#172015";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(route[i].x, route[i].y, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
          }

          ctx.restore();
        }

        drawAim(ctx) {
          const launch = this.getLaunchVector();
          const startX = this.squash.x;
          const startY = this.squash.y;
          const previewLength = 78 + launch.percent * 160;

          ctx.save();
          ctx.strokeStyle = "rgba(255, 93, 143, 0.85)";
          ctx.lineWidth = 3;
          ctx.setLineDash([6, 6]);
          ctx.beginPath();
          ctx.moveTo(startX, startY);
          ctx.lineTo(this.dragPoint.x, this.dragPoint.y);
          ctx.stroke();

          ctx.strokeStyle = "rgba(45, 90, 61, 0.55)";
          ctx.lineWidth = 4;
          ctx.setLineDash([8, 9]);
          ctx.beginPath();
          ctx.moveTo(startX, startY);
          ctx.lineTo(startX + launch.nx * previewLength, startY + launch.ny * previewLength);
          ctx.stroke();
          ctx.setLineDash([]);

          for (let i = 1; i <= 6; i += 1) {
            const t = i / 6;
            const px = startX + launch.nx * previewLength * t;
            const py = startY + launch.ny * previewLength * t + 10 * t * t;
            const r = 4.5 - t * 1.5;
            ctx.fillStyle = i >= 5 ? "#ff5d8f" : (i >= 3 ? "#ffc23c" : "#8fd14f");
            ctx.beginPath();
            ctx.arc(px, py, r, 0, Math.PI * 2);
            ctx.fill();
          }

          const tipX = startX + launch.nx * previewLength;
          const tipY = startY + launch.ny * previewLength;
          ctx.fillStyle = "#ff5d8f";
          ctx.beginPath();
          ctx.moveTo(tipX + launch.nx * 9, tipY + launch.ny * 9);
          ctx.lineTo(tipX + launch.ny * 7 - launch.nx * 2, tipY - launch.nx * 7 - launch.ny * 2);
          ctx.lineTo(tipX - launch.ny * 7 - launch.nx * 2, tipY + launch.nx * 7 - launch.ny * 2);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }

      new Game();
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    })();
  </script>
</body>
</html>
