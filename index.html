<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="assets/wogua.png?v=transparent-bg">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#cfe477">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="窝瓜弹弹乐">
  <meta name="mobile-web-app-capable" content="yes">
  <title>窝瓜弹弹乐</title>
  <style>
    :root {
      --ink: #2c4a32;
      --ink-soft: #5f7d63;
      --paper: #fffdf7;
      --paper-2: #fef3e4;
      --cream: #fff7e6;
      --wogua: #8fd14f;
      --wogua-deep: #57a832;
      --wogua-light: #c2ee8a;
      --accent: #ffc23c;
      --accent-deep: #ef9a1e;
      --peach: #ff9e7a;
      --berry: #ff5d8f;
      --sky-1: #c6ecff;
      --sky-2: #ffe0ee;
      --sky-3: #d6f0c6;
      --grass: #7fc24a;
      --grass-deep: #4f9e2e;
      --border: #2d5a3d;
      --border-soft: rgba(45, 90, 61, 0.22);
      --panel: rgba(255, 253, 247, 0.95);
      --shadow-soft: 0 8px 20px rgba(45, 90, 61, 0.16), 0 2px 6px rgba(45, 90, 61, 0.1);
      --shadow-press: 0 3px 8px rgba(45, 90, 61, 0.18);
      --radius: 14px;
      --radius-lg: 24px;
      --font-rounded: ui-rounded, "SF Pro Rounded", "Hiragino Maru Gothic ProN", "Quicksand", "M PLUS Rounded 1c", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      background: radial-gradient(125% 85% at 50% 0%, #eaf8d8 0%, #cdeccd 45%, #b4ddcf 100%);
      color: var(--ink);
      font-family: var(--font-rounded);
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding:
        max(10px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(10px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    .game-shell {
      position: relative;
      width: min(480px, calc(100vw - 20px), calc((100dvh - 20px) * 9 / 16));
      aspect-ratio: 9 / 16;
      overflow: hidden;
      background: var(--sky-1);
      border: 3px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 26px 64px rgba(45, 90, 61, 0.3), 0 6px 14px rgba(45, 90, 61, 0.16), inset 0 0 0 1px rgba(255, 255, 255, 0.45);
      isolation: isolate;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: auto;
      background: var(--sky-1);
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .top-row,
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .stats {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .stat,
    button {
      min-height: 36px;
      border: 2px solid var(--border);
      background: var(--panel);
      color: var(--ink);
      box-shadow: var(--shadow-soft);
      font-weight: 800;
      line-height: 1;
      border-radius: var(--radius);
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
    }

    .stat {
      display: grid;
      place-items: center;
      padding: 0 11px;
      font-size: 13px;
      white-space: nowrap;
    }

    .buttons {
      display: flex;
      gap: 7px;
      pointer-events: auto;
    }

    button {
      appearance: none;
      border-radius: var(--radius);
      padding: 0 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(180deg, #ffffff 0%, var(--paper-2) 100%);
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    }

    button:hover {
      filter: brightness(1.04);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: var(--shadow-press);
    }

    button:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
      filter: none;
    }

    .power {
      width: 100%;
      max-width: 220px;
      align-self: center;
      background: rgba(45, 90, 61, 0.8);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 7px 10px;
      color: var(--paper);
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: var(--shadow-soft);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }

    .power-track {
      height: 10px;
      margin-top: 5px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 6px;
      overflow: hidden;
    }

    .power-fill {
      height: 100%;
      width: 0%;
      border-radius: 6px;
      background: linear-gradient(90deg, #8fd14f 0%, #ffc23c 55%, #ff5d8f 100%);
      transition: width 0.05s linear;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 22px;
      background: radial-gradient(120% 80% at 50% 40%, rgba(45, 90, 61, 0.22), rgba(18, 36, 24, 0.62));
      -webkit-backdrop-filter: blur(3px);
      backdrop-filter: blur(3px);
      pointer-events: auto;
    }

    .modal {
      width: min(310px, 100%);
      border: 2px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
      color: var(--ink);
      padding: 20px;
      text-align: center;
      box-shadow: 0 18px 42px rgba(18, 36, 24, 0.34), 0 4px 10px rgba(18, 36, 24, 0.16);
    }

    .modal h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .modal p {
      margin: 0 0 16px;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink-soft);
    }

    .modal-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .screen {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
      background: radial-gradient(125% 85% at 50% 0%, rgba(198, 236, 255, 0.6), rgba(255, 224, 238, 0.36) 48%, rgba(45, 90, 61, 0.42) 100%);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
      pointer-events: auto;
    }

    .screen-panel {
      width: min(390px, 100%);
      max-height: calc(100% - 12px);
      overflow: auto;
      border: 2px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(180deg, var(--paper) 0%, var(--cream) 100%);
      box-shadow: 0 18px 42px rgba(18, 36, 24, 0.28), 0 4px 10px rgba(18, 36, 24, 0.14), inset 0 0 0 1px rgba(255, 255, 255, 0.6);
      padding: 18px;
      scrollbar-width: thin;
    }

    .menu-panel {
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: min(520px, 86%);
      overflow: hidden;
    }

    .brand-mark {
      width: 108px;
      height: 108px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border: 3px solid var(--border);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, var(--wogua-light), var(--wogua) 60%, var(--wogua-deep) 100%);
      box-shadow: 0 10px 24px rgba(87, 168, 50, 0.4), inset 0 -6px 12px rgba(45, 90, 61, 0.2), inset 0 6px 10px rgba(255, 255, 255, 0.45);
    }

    .brand-mark img {
      width: 84px;
      height: 88px;
      image-rendering: pixelated;
      object-fit: contain;
      filter: drop-shadow(0 3px 4px rgba(45, 90, 61, 0.35));
    }

    .menu-panel h1,
    .screen-panel h2 {
      margin: 0;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .menu-panel h1 {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 1px;
      background: linear-gradient(180deg, var(--wogua-deep) 0%, var(--wogua) 60%, var(--accent-deep) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      filter: drop-shadow(0 2px 0 rgba(255, 255, 255, 0.55));
    }

    .screen-panel h2 {
      font-size: 26px;
      font-weight: 900;
      color: var(--ink);
    }

    .menu-subtitle {
      margin: 10px auto 18px;
      width: min(260px, 100%);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
      color: var(--ink-soft);
    }

    .menu-actions,
    .screen-actions {
      display: grid;
      gap: 10px;
    }

    .menu-actions button,
    .screen-actions button {
      width: 100%;
      min-height: 46px;
      font-size: 15px;
      font-weight: 900;
    }

    .menu-actions button:nth-child(1) {
      background: linear-gradient(180deg, var(--wogua-light) 0%, var(--wogua) 55%, var(--wogua-deep) 100%);
      color: #ffffff;
      border-color: var(--wogua-deep);
      text-shadow: 0 1px 1px rgba(45, 90, 61, 0.35);
    }

    .menu-actions button:nth-child(2) {
      background: linear-gradient(180deg, #ffe7a6 0%, var(--accent) 55%, var(--accent-deep) 100%);
      color: #6a4400;
      border-color: var(--accent-deep);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    .menu-actions button:nth-child(3) {
      background: linear-gradient(180deg, #ffd2bd 0%, var(--peach) 55%, #e8815c 100%);
      color: #5e2a17;
      border-color: #d9744f;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .menu-actions button:nth-child(4) {
      background: linear-gradient(180deg, #c3ecff 0%, #7ec8f0 55%, #4fa8d8 100%);
      color: #10324a;
      border-color: #3f8ab8;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    .screen-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .screen-top button {
      flex: 0 0 auto;
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .level-pager {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .level-pager button {
      width: 100%;
      min-height: 40px;
      font-weight: 900;
    }

    .level-page-text {
      min-width: 80px;
      min-height: 36px;
      display: grid;
      place-items: center;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      background: var(--paper-2);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: var(--shadow-press);
    }

    .level-card {
      min-height: 110px;
      padding: 11px;
      text-align: left;
      line-height: 1.25;
      background: linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
    }

    .level-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(45, 90, 61, 0.18);
    }

    .level-card:active {
      transform: translateY(1px);
    }

    .level-card.is-current {
      background: linear-gradient(180deg, #fff1d6 0%, var(--accent) 85%);
      border-color: var(--accent-deep);
    }

    .level-card strong,
    .codex-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
      line-height: 1.2;
    }

    .level-card span,
    .codex-card span,
    .level-card small {
      display: block;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .level-card small {
      margin-top: 7px;
      color: #8a5a2a;
    }

    .codex-section + .codex-section {
      margin-top: 14px;
    }

    .codex-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 0 0 14px;
    }

    .codex-tabs button {
      min-width: 0;
      padding-left: 4px;
      padding-right: 4px;
      font-weight: 900;
    }

    .codex-tabs button.is-active {
      background: linear-gradient(180deg, var(--wogua-light), var(--wogua) 60%, var(--wogua-deep));
      color: #ffffff;
      border-color: var(--wogua-deep);
      text-shadow: 0 1px 1px rgba(45, 90, 61, 0.3);
    }

    .codex-section h3 {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.2;
      color: var(--ink);
    }

    .codex-list {
      display: grid;
      gap: 10px;
    }

    .codex-card {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 11px;
      align-items: center;
      border: 2px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--paper), var(--paper-2));
      padding: 10px;
      box-shadow: var(--shadow-press);
    }

    .codex-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border: 2px solid var(--border);
      border-radius: 14px;
      background: radial-gradient(circle at 35% 30%, var(--wogua-light), var(--wogua) 70%);
      color: #ffffff;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      box-shadow: inset 0 -4px 8px rgba(45, 90, 61, 0.2), inset 0 4px 6px rgba(255, 255, 255, 0.4);
      text-shadow: 0 1px 1px rgba(45, 90, 61, 0.3);
    }

    .codex-icon.terrain {
      background: radial-gradient(circle at 35% 30%, #c3ecff, #7ec8f0 70%);
    }

    .codex-icon.level {
      background: radial-gradient(circle at 35% 30%, #ffe7a6, var(--accent) 70%);
      color: #6a4400;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .skill-summary {
      margin: 0 0 14px;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.35;
      color: var(--ink-soft);
    }

    .skill-list {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .skill-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 11px;
      align-items: center;
      border: 2px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--paper), var(--paper-2));
      padding: 11px;
      box-shadow: var(--shadow-press);
    }

    .skill-card strong,
    .skill-card span {
      display: block;
    }

    .skill-card strong {
      margin-bottom: 5px;
      font-size: 15px;
      line-height: 1.2;
    }

    .skill-card span {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--ink-soft);
    }

    .skill-stepper {
      display: grid;
      grid-template-columns: 34px 34px 34px;
      gap: 6px;
      align-items: center;
    }

    .skill-stepper button {
      min-height: 34px;
      padding: 0;
      font-size: 18px;
      font-weight: 900;
      border-radius: 11px;
    }

    .skill-level {
      display: grid;
      min-height: 34px;
      place-items: center;
      border: 2px solid var(--border);
      border-radius: 11px;
      background: radial-gradient(circle at 35% 30%, var(--wogua-light), var(--wogua) 70%);
      font-size: 14px;
      font-weight: 900;
      color: #ffffff;
      box-shadow: inset 0 -3px 6px rgba(45, 90, 61, 0.2);
      text-shadow: 0 1px 1px rgba(45, 90, 61, 0.3);
    }

    .hint-box {
      max-width: 292px;
      border: 2px solid var(--border);
      border-radius: 14px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: var(--shadow-soft);
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.4;
      pointer-events: none;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 420px) {
      .screen {
        padding: 12px;
      }

      .screen-panel {
        padding: 12px;
      }

      .screen-panel h2 {
        font-size: 22px;
      }

      .level-card {
        min-height: 98px;
        padding: 8px;
      }

      .level-card strong {
        margin-bottom: 5px;
        font-size: 14px;
      }

      .level-card small {
        margin-top: 5px;
      }
    }

    @media (max-width: 360px) {
      .hud {
        padding: 8px;
      }

      .stat,
      button {
        min-height: 32px;
        font-size: 12px;
        padding-left: 8px;
        padding-right: 8px;
      }

      .screen {
        padding: 12px;
      }

      .screen-panel {
        padding: 12px;
      }

      .menu-panel h1 {
        font-size: 30px;
      }

      .screen-panel h2 {
        font-size: 22px;
      }

      .level-grid {
        grid-template-columns: 1fr;
      }

      .level-pager {
        grid-template-columns: 1fr;
      }

      .level-card {
        min-height: 102px;
      }

      .skill-card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="窝瓜弹弹乐游戏区域">
    <canvas id="game" width="480" height="853"></canvas>

    <section class="screen" id="mainMenu" aria-label="主界面">
      <div class="screen-panel menu-panel">
        <div class="brand-mark">
          <img src="assets/wogua.png?v=transparent-bg" alt="窝瓜">
        </div>
        <h1>窝瓜弹弹乐</h1>
        <p class="menu-subtitle">弹开机关，清空怪物，二十五关连打。</p>
        <div class="menu-actions">
          <button id="startBtn" type="button">开始游戏</button>
          <button id="levelSelectBtn" type="button">选择关卡</button>
          <button id="skillsBtn" type="button">技能加点</button>
          <button id="codexBtn" type="button">地形怪物图鉴</button>
        </div>
      </div>
    </section>

    <section class="screen hidden" id="levelSelect" aria-label="关卡选择">
      <div class="screen-panel">
        <div class="screen-top">
          <h2>选择关卡</h2>
          <button class="backToMenuBtn" type="button">返回</button>
        </div>
        <div class="level-grid" id="levelGrid"></div>
        <div class="level-pager" id="levelPager" aria-label="关卡分页">
          <button id="prevLevelPageBtn" type="button">上一页</button>
          <div class="level-page-text" id="levelPageText">1 / 1</div>
          <button id="nextLevelPageBtn" type="button">下一页</button>
        </div>
      </div>
    </section>

    <section class="screen hidden" id="codexScreen" aria-label="地形怪物图鉴">
      <div class="screen-panel">
        <div class="screen-top">
          <h2>机制图鉴</h2>
          <button class="backToMenuBtn" type="button">返回</button>
        </div>
        <div class="codex-tabs" id="codexTabs"></div>
        <div id="codexContent"></div>
      </div>
    </section>

    <section class="screen hidden" id="skillScreen" aria-label="技能加点">
      <div class="screen-panel">
        <div class="screen-top">
          <h2>技能加点</h2>
          <button class="backToMenuBtn" type="button">返回</button>
        </div>
        <p class="skill-summary" id="skillSummary">技能点 0/3</p>
        <div class="skill-list" id="skillList"></div>
        <div class="screen-actions">
          <button id="resetSkillsBtn" type="button">重置技能</button>
        </div>
      </div>
    </section>

    <section class="hud" aria-label="游戏状态">
      <div class="top-row">
        <div class="stats">
          <div class="stat" id="levelStat">Level 1</div>
          <div class="stat" id="shotsStat">Shots 3</div>
          <div class="stat" id="monsterStat">Monsters 2/2</div>
        </div>
        <div class="buttons">
          <button id="menuBtn" type="button">菜单</button>
          <button id="hintBtn" type="button">提示</button>
          <button id="restartBtn" type="button">重玩</button>
          <button id="nextBtn" class="hidden" type="button">下一关</button>
        </div>
      </div>

      <div class="bottom-row">
        <div class="hint-box hidden" id="hintBox"></div>
        <div class="power hidden" id="powerMeter">
          <div id="powerText">Power 0%</div>
          <div class="power-track"><div class="power-fill" id="powerFill"></div></div>
        </div>
      </div>

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function length(x, y) {
        return Math.hypot(x, y);
      }

      function drawPixelDiamond(ctx, x, y, size, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
        ctx.beginPath();
        ctx.arc(x - size * 0.3, y - size * 0.3, size * 0.36, 0, Math.PI * 2);
        ctx.fill();
      }

      function rectCircleCollision(circle, rect) {
        const nearestX = clamp(circle.x, rect.x, rect.x + rect.width);
        const nearestY = clamp(circle.y, rect.y, rect.y + rect.height);
        let dx = circle.x - nearestX;
        let dy = circle.y - nearestY;
        let dist = Math.hypot(dx, dy);

        if (dist > 0 && dist < circle.radius) {
          return {
            hit: true,
            nx: dx / dist,
            ny: dy / dist,
            depth: circle.radius - dist
          };
        }

        if (dist === 0) {
          const left = Math.abs(circle.x - rect.x);
          const right = Math.abs(rect.x + rect.width - circle.x);
          const top = Math.abs(circle.y - rect.y);
          const bottom = Math.abs(rect.y + rect.height - circle.y);
          const min = Math.min(left, right, top, bottom);

          if (min === left) return { hit: true, nx: -1, ny: 0, depth: circle.radius + left };
          if (min === right) return { hit: true, nx: 1, ny: 0, depth: circle.radius + right };
          if (min === top) return { hit: true, nx: 0, ny: -1, depth: circle.radius + top };
          return { hit: true, nx: 0, ny: 1, depth: circle.radius + bottom };
        }

        return { hit: false, nx: 0, ny: 0, depth: 0 };
      }

      class Squash {
        constructor(start) {
          this.startX = start.x;
          this.startY = start.y;
          this.x = start.x;
          this.y = start.y;
          this.radius = 32;
          this.velocityX = 0;
          this.velocityY = 0;
          this.mass = 1;
          this.bounce = 0.85;
          this.damage = 1;
          this.state = "idle";
          this.stopTimer = 0;
          this.sprite = null;
          this.hitSquash = 0;
          this.portalCooldown = 0;
        }

        setSprite(sprite) {
          this.sprite = sprite;
        }

        contains(point) {
          return length(point.x - this.x, point.y - this.y) <= this.radius + 18;
        }

        launch(vx, vy) {
          const speed = length(vx, vy);
          const scale = speed > MAX_SPEED ? MAX_SPEED / speed : 1;
          this.velocityX = vx * scale;
          this.velocityY = vy * scale;
          this.state = "moving";
          this.stopTimer = 0;
        }

        integrate(dt) {
          if (this.state !== "moving") return;
          this.x += this.velocityX * dt;
          this.y += this.velocityY * dt;
          const decay = Math.pow(FRICTION, dt * 60);
          this.velocityX *= decay;
          this.velocityY *= decay;
          this.hitSquash = Math.max(0, this.hitSquash - dt * 5);
          this.portalCooldown = Math.max(0, this.portalCooldown - dt);
        }

        shouldStop(dt) {
          if (this.state !== "moving") return false;
          if (length(this.velocityX, this.velocityY) < STOP_THRESHOLD) {
            this.stopTimer += dt;
          } else {
            this.stopTimer = 0;
          }
          return this.stopTimer > 0.34;
        }

        reset() {
          this.x = this.startX;
          this.y = this.startY;
          this.velocityX = 0;
          this.velocityY = 0;
          this.state = "idle";
          this.stopTimer = 0;
          this.hitSquash = 0;
          this.portalCooldown = 0;
        }

        draw(ctx) {
          ctx.save();
          ctx.translate(this.x, this.y);

          ctx.fillStyle = "rgba(45, 90, 61, 0.22)";
          ctx.beginPath();
          ctx.ellipse(0, 30, 26, 7, 0, 0, Math.PI * 2);
          ctx.fill();

          if (this.sprite) {
            const width = this.sprite.naturalWidth || this.sprite.width;
            const height = this.sprite.naturalHeight || this.sprite.height;
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(this.sprite, -width / 2, -height / 2);
          }

          ctx.restore();
        }
      }

      class MiniSquash {
        constructor(x, y, vx, vy, sprite) {
          this.x = x;
          this.y = y;
          this.radius = 18;
          this.velocityX = vx;
          this.velocityY = vy;
          this.bounce = 0.8;
          this.damage = 1;
          this.sprite = sprite;
          this.hitSquash = 0;
          this.portalCooldown = 0;
          this.life = 4.4;
          this.stopTimer = 0;
          this.isAlive = true;
        }

        integrate(dt) {
          if (!this.isAlive) return;
          this.life -= dt;
          this.x += this.velocityX * dt;
          this.y += this.velocityY * dt;
          const decay = Math.pow(FRICTION, dt * 60);
          this.velocityX *= decay;
          this.velocityY *= decay;
          this.hitSquash = Math.max(0, this.hitSquash - dt * 5);
          this.portalCooldown = Math.max(0, this.portalCooldown - dt);

          if (length(this.velocityX, this.velocityY) < STOP_THRESHOLD) {
            this.stopTimer += dt;
          } else {
            this.stopTimer = 0;
          }

          if (this.life <= 0 || this.stopTimer > 0.55) {
            this.isAlive = false;
          }
        }

        draw(ctx) {
          if (!this.isAlive || !this.sprite) return;
          const width = (this.sprite.naturalWidth || this.sprite.width) * 0.58;
          const height = (this.sprite.naturalHeight || this.sprite.height) * 0.58;
          ctx.save();
          ctx.globalAlpha = clamp(this.life / 0.7, 0.35, 0.86);
          ctx.translate(this.x, this.y);
          ctx.fillStyle = "rgba(45, 90, 61, 0.2)";
          ctx.beginPath();
          ctx.ellipse(0, height / 2 + 2, width * 0.4, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(this.sprite, -width / 2, -height / 2, width, height);
          ctx.restore();
        }
      }

      class Monster {
        constructor(config) {
          this.x = config.x;
          this.y = config.y;
          this.baseX = config.x;
          this.baseY = config.y;
          this.radius = config.radius || 25;
          this.type = config.type || "normal";
          this.maxHp = config.hp || (this.type === "helmet" ? 2 : 1);
          this.hp = this.maxHp;
          this.isAlive = true;
          this.hitCooldown = 0;
          this.hitFlash = 0;
          this.deathTimer = 0;
          this.path = config.path || null;
          this.pathTime = Math.random() * Math.PI;
        }

        update(dt) {
          this.hitCooldown = Math.max(0, this.hitCooldown - dt);
          this.hitFlash = Math.max(0, this.hitFlash - dt);
          this.deathTimer = Math.max(0, this.deathTimer - dt);

          if (this.isAlive && this.type === "moving") {
            this.pathTime += dt * 1.35;
            const span = this.path?.span || 72;
            this.x = this.baseX + Math.cos(this.pathTime) * span;
          }
        }

        hit(damage, game, force = false) {
          if (!this.isAlive) return false;
          if (this.hitCooldown > 0 && !force) return false;

          this.hp -= damage;
          this.hitCooldown = 0.18;
          this.hitFlash = 0.18;
          game.addFloatingText("-" + damage + " HP", this.x, this.y - this.radius - 8, "#fff8dc");
          game.spawnBurst(this.x, this.y, this.hp <= 0 ? "#f2c94c" : "#cfe477", 12);

          if (this.hp <= 0) {
            this.isAlive = false;
            this.deathTimer = 0.34;
            game.spawnBurst(this.x, this.y, "#83b843", 22);
          }

          return true;
        }

        draw(ctx) {
          if (!this.isAlive && this.deathTimer <= 0) return;

          const dyingScale = this.isAlive ? 1 : Math.max(0.05, this.deathTimer / 0.34);
          const flash = this.hitFlash > 0;
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.scale(1.08 - dyingScale * 0.08, dyingScale);

          ctx.fillStyle = "rgba(45, 90, 61, 0.18)";
          ctx.beginPath();
          ctx.ellipse(0, 27, 22, 6, 0, 0, Math.PI * 2);
          ctx.fill();

          const body = ctx.createLinearGradient(0, -24, 0, 26);
          body.addColorStop(0, flash ? "#fff8dc" : "#8fd14f");
          body.addColorStop(1, flash ? "#fff8dc" : "#57a832");
          ctx.fillStyle = body;
          ctx.strokeStyle = "#2d5a3d";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.roundRect(-24, -24, 48, 50, 12);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = "rgba(255, 255, 255, 0.26)";
          ctx.beginPath();
          ctx.roundRect(-19, -19, 22, 12, 6);
          ctx.fill();

          ctx.fillStyle = "#ffffff";
          ctx.beginPath();
          ctx.arc(-10, -4, 6.5, 0, Math.PI * 2);
          ctx.arc(10, -4, 6.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#2d5a3d";
          ctx.beginPath();
          ctx.arc(-9, -3, 3.2, 0, Math.PI * 2);
          ctx.arc(11, -3, 3.2, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "#2d5a3d";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 12, 7, 0.15, Math.PI - 0.15);
          ctx.stroke();

          ctx.fillStyle = "rgba(255, 93, 143, 0.4)";
          ctx.beginPath();
          ctx.arc(-16, 9, 4, 0, Math.PI * 2);
          ctx.arc(16, 9, 4, 0, Math.PI * 2);
          ctx.fill();

          if (this.type === "helmet") {
            const helmet = ctx.createLinearGradient(0, -32, 0, -13);
            helmet.addColorStop(0, "#c7cdd2");
            helmet.addColorStop(1, "#7f868d");
            ctx.fillStyle = helmet;
            ctx.strokeStyle = "#2d5a3d";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(-23, -32, 46, 19, 8);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctx.beginPath();
            ctx.roundRect(-18, -29, 14, 5, 3);
            ctx.fill();
          }

          if (this.hp > 1) {
            ctx.fillStyle = "#ff5d8f";
            for (let i = 0; i < this.hp; i += 1) {
              ctx.beginPath();
              ctx.roundRect(-10 + i * 13, -42, 9, 8, 3);
              ctx.fill();
            }
          }

          ctx.restore();
        }
      }

      class Crate {

        }

        draw(ctx) {
          if (!this.alive) return;
          ctx.save();
          ctx.fillStyle = "rgba(45, 90, 61, 0.18)";
          ctx.fillRect(this.x + 3, this.y + 4, this.width, this.height);

          const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
          grad.addColorStop(0, "#c0854a");
          grad.addColorStop(1, "#9a6638");

          ctx.moveTo(this.x + 8, this.y + 8);
          ctx.lineTo(this.x + this.width - 8, this.y + this.height - 8);
          ctx.moveTo(this.x + this.width - 8, this.y + 8);
          ctx.lineTo(this.x + 8, this.y + this.height - 8);
          ctx.stroke();

          ctx.fillStyle = "rgba(255, 255, 255, 0.22)";

      class Bomb {

        explode(game) {
          if (!this.alive) return;
          this.alive = false;
          game.shake = Math.max(game.shake, 13);
          game.spawnExplosion(this.x, this.y, this.explosionRadius);

          for (const monster of game.monsters) {
            if (monster.isAlive && length(monster.x - this.x, monster.y - this.y) <= this.explosionRadius) {

          ctx.fillStyle = "rgba(45, 90, 61, 0.2)";
          ctx.beginPath();
          ctx.ellipse(0, this.radius + 4, this.radius * 0.85, 5, 0, 0, Math.PI * 2);

          const grad = ctx.createRadialGradient(-8, -8, 4, 0, 0, this.radius);
          grad.addColorStop(0, "#ff8a78");

          ctx.quadraticCurveTo(6, -this.radius - 6, 10, -this.radius - 10);
          ctx.stroke();
          ctx.fillStyle = "#ffc23c";

        }
